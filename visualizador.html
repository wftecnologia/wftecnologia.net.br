<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visualizador de Permissões NTFS</title>

  <!-- Biblioteca XLSX -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>

    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding: 20px;
      color: #1f2937;
    }

    .container {
      max-width: 1400px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
    }

    input[type="file"],
    input[type="text"] {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      width: 100%;
      box-sizing: border-box;
    }

    .tree {
      margin-top: 20px;
    }

    .folder {
      margin-left: 20px;
      border-left: 1px solid #d1d5db;
      padding-left: 15px;
      margin-top: 10px;
    }

    .folder-title {
      cursor: pointer;
      font-weight: bold;
      padding: 6px;
      border-radius: 6px;
      user-select: none;
    }

    .folder-title:hover {
      background: #f3f4f6;
    }

    .permission {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px;
      margin-top: 8px;
    }

    .permission-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 8px;
      margin-top: 8px;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 20px;
      font-size: 12px;
      background: #dbeafe;
      color: #1d4ed8;
    }

    .hidden {
      display: none;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-top: 20px;
    }

    .stat-box {
      background: #eff6ff;
      border-radius: 12px;
      padding: 15px;
    }

    .stat-box strong {
      display: block;
      font-size: 22px;
      margin-top: 5px;
    }

    .perm-read {
      border-left: 6px solid #22c55e;
    }

    .perm-modify {
      border-left: 6px solid #f59e0b;
    }

    .perm-full {
      border-left: 6px solid #ef4444;
    }

  </style>
</head>
<body>

<div class="container">

  <div class="card">

    <h1>Visualizador de Permissões NTFS</h1>

    <p>
      Faça upload do CSV ou XLSX exportado pelo PowerShell.
    </p>

    <input type="file" id="csvFile" accept=".csv,.xlsx,.xls">

    <br><br>

    <input type="text" id="search" placeholder="Buscar usuário, grupo, permissão ou pasta...">

    <div class="stats" id="stats"></div>

  </div>

  <div class="card">

    <div id="tree" class="tree"></div>

  </div>

</div>

<script>

let originalData = [];

document.getElementById('csvFile').addEventListener('change', function(e) {

  const file = e.target.files[0];

  if (!file) return;

  const reader = new FileReader();

  const fileName = file.name.toLowerCase();

  // XLSX
  if (fileName.endsWith('.xlsx') || fileName.endsWith('.xls')) {

    reader.onload = function(event) {

      const data = new Uint8Array(event.target.result);

      const workbook = XLSX.read(data, { type: 'array' });

      const firstSheet = workbook.SheetNames[0];

      const worksheet = workbook.Sheets[firstSheet];

      const jsonData = XLSX.utils.sheet_to_json(worksheet, { defval: '' });

      originalData = jsonData;

      renderStats(jsonData);

      renderTree(jsonData);

    };

    reader.readAsArrayBuffer(file);

  }

  // CSV
  else {

    reader.onload = function(event) {

      const csv = event.target.result;

      processCSV(csv);

    };

    reader.readAsText(file, 'UTF-8');

  }

});

document.getElementById('search').addEventListener('input', function() {

  renderTree(originalData, this.value.toLowerCase());

});

function processCSV(csv) {

  const lines = csv.split('\n').filter(l => l.trim() !== '');

  const headers = parseCSVLine(lines[0]);

  const data = [];

  for (let i = 1; i < lines.length; i++) {

    const values = parseCSVLine(lines[i]);

    const obj = {};

    headers.forEach((header, index) => {

      obj[header] = values[index] || '';

    });

    data.push(obj);

  }

  originalData = data;

  renderStats(data);

  renderTree(data);

}

function parseCSVLine(line) {

  const result = [];

  let current = '';

  let insideQuotes = false;

  for (let char of line) {

    if (char === '"') {

      insideQuotes = !insideQuotes;

    }
    else if (char === ',' && !insideQuotes) {

      result.push(current);

      current = '';

    }
    else {

      current += char;

    }

  }

  result.push(current);

  return result.map(v => v.replace(/^"|"$/g, '').trim());

}

function normalizePath(path) {

  return (path || '')
    .trim()
    .toLowerCase()
    .replace(/\\\\+/g, '\\');

}

function renderStats(data) {

  const usuarios = new Set(
    data.map(x => (x.UsuarioLogin || '').toLowerCase())
  ).size;

  const grupos = new Set(
    data.map(x => (x.GrupoPermissao || '').toLowerCase())
  ).size;

  // CONTAGEM REAL DE PASTAS
  const pastas = new Set(
    data.map(x => normalizePath(x.Pasta))
  ).size;

  const registros = data.length;

  document.getElementById('stats').innerHTML = `

    <div class="stat-box">
      Usuários
      <strong>${usuarios}</strong>
    </div>

    <div class="stat-box">
      Grupos
      <strong>${grupos}</strong>
    </div>

    <div class="stat-box">
      Pastas
      <strong>${pastas}</strong>
    </div>

    <div class="stat-box">
      Registros
      <strong>${registros}</strong>
    </div>

  `;

}

function renderTree(data, filter = '') {

  const tree = {};

  data.forEach(item => {

    const searchable = JSON.stringify(item).toLowerCase();

    if (filter && !searchable.includes(filter)) {
      return;
    }

    const path = normalizePath(item.Pasta)
      .replace(/^\\\\/, '')
      .split('\\')
      .filter(Boolean);

    let current = tree;

    path.forEach(part => {

      if (!current[part]) {

        current[part] = {
          __children: {},
          __permissions: []
        };

      }

      current = current[part].__children;

    });

    let node = tree;

    path.forEach((part, index) => {

      node = node[part];

      if (index < path.length - 1) {
        node = node.__children;
      }

    });

    if (!node.__permissions) {
      node.__permissions = [];
    }

    node.__permissions.push(item);

  });

  const container = document.getElementById('tree');

  container.innerHTML = '';

  Object.keys(tree).forEach(folder => {

    container.appendChild(createFolder(folder, tree[folder]));

  });

}

function createFolder(name, node) {

  const wrapper = document.createElement('div');

  wrapper.className = 'folder';

  const title = document.createElement('div');

  title.className = 'folder-title';

  title.innerHTML = '📁 ' + name;

  const content = document.createElement('div');

  title.addEventListener('click', () => {

    content.classList.toggle('hidden');

  });

  node.__permissions.forEach(perm => {

    const div = document.createElement('div');

    let classePermissao = '';

    const permissao = (perm.Permissao || '').toLowerCase();

    if (permissao.includes('full')) {

      classePermissao = 'perm-full';

    }
    else if (permissao.includes('modify')) {

      classePermissao = 'perm-modify';

    }
    else {

      classePermissao = 'perm-read';

    }

    div.className = 'permission ' + classePermissao;

    div.innerHTML = `

      <div>
        <strong>${perm.UsuarioLogin || 'N/A'}</strong>
      </div>

      <div class="permission-grid">

        <div>
          <span class="badge">Nome</span><br>
          ${perm.Nome || ''}
        </div>

        <div>
          <span class="badge">Grupo</span><br>
          ${perm.GrupoPermissao || ''}
        </div>

        <div>
          <span class="badge">Permissão</span><br>
          ${perm.Permissao || ''}
        </div>

      </div>

    `;

    content.appendChild(div);

  });

  Object.keys(node.__children).forEach(child => {

    content.appendChild(createFolder(child, node.__children[child]));

  });

  wrapper.appendChild(title);

  wrapper.appendChild(content);

  return wrapper;

}

</script>

</body>
