<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Dashboard de Permissões
  </title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

</head>

<body>

<div class="container">

  <div class="topbar">

    <div class="title">

      <h1>
        Dashboard de Permissões
      </h1>
      
    </div>

    <div class="actions">

      <input
        type="file"
        id="csvFile"
        accept=".csv,.xlsx,.xls"
      >

      <input
        type="text"
        id="search"
        placeholder="Buscar usuário, grupo ou pasta..."
      >

      <button id="generatePDF">

        Gerar PDF

      </button>

    </div>

  </div>

  <div
    class="cards"
    id="stats"
  ></div>

  <div class="charts">

    <div class="chart-box">

      <h3>
        Distribuição de Permissões
      </h3>

      <div class="pie-wrapper">

        <canvas id="permChart"></canvas>

      </div>

      <div class="risk-grid">

        <div class="risk-card risk-read">

          <div class="risk-title">
            Read
          </div>

          <div
            id="riskRead"
            class="risk-number"
          >
            0
          </div>

        </div>

        <div class="risk-card risk-modify">

          <div class="risk-title">
            Modify
          </div>

          <div
            id="riskModify"
            class="risk-number"
          >
            0
          </div>

        </div>

        <div class="risk-card risk-full">

          <div class="risk-title">
            Full
          </div>

          <div
            id="riskFull"
            class="risk-number"
          >
            0
          </div>

        </div>

      </div>

    </div>

    <div class="chart-box">

      <h3>
        Permissões por Nível de Risco
      </h3>

      <div style="height:350px;">

        <canvas id="riskChart"></canvas>

      </div>

    </div>

  </div>

  <div class="tree-box">

    <h2>
      Árvore de Permissões
    </h2>

    <div id="tree"></div>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
