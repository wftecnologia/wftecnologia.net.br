<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página em Construção</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: linear-gradient(135deg, #0f172a, #111827, #1e293b);
      overflow: hidden;
    }

    .blur-circle {
      position: absolute;
      border-radius: 9999px;
      filter: blur(90px);
      opacity: 0.25;
      animation: float 8s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-20px);
      }
    }

    .glass {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.12);
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center text-white relative px-6">

  <!-- Efeitos -->
  <div class="blur-circle w-72 h-72 bg-cyan-500 top-[-80px] left-[-80px]"></div>
  <div class="blur-circle w-96 h-96 bg-indigo-500 bottom-[-120px] right-[-100px]"></div>

  <!-- Card Principal -->
  <div class="glass rounded-3xl p-10 md:p-14 max-w-2xl w-full text-center shadow-2xl relative z-10">

    <div class="mb-8">
      <div class="w-24 h-24 mx-auto rounded-full bg-cyan-500/20 flex items-center justify-center border border-cyan-400/30">
        <svg xmlns="http://www.w3.org/2000/svg"
             class="w-12 h-12 text-cyan-300"
             fill="none"
             viewBox="0 0 24 24"
             stroke="currentColor">
          <path stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1.8"
                d="M9.75 17L15 12l-5.25-5" />
        </svg>
      </div>
    </div>

    <h1 class="text-4xl md:text-6xl font-bold mb-6">
      Site em Construção
    </h1>

    <p class="text-gray-300 text-lg md:text-xl leading-relaxed mb-10">
      Estamos preparando uma experiência incrível para você.
      Em breve nosso novo site estará disponível com muitas novidades.
    </p>

    <!-- Barra de progresso -->
    <div class="w-full bg-white/10 rounded-full h-4 overflow-hidden mb-4">
      <div class="bg-cyan-400 h-4 rounded-full animate-pulse"
           style="width: 72%">
      </div>
    </div>

    <p class="text-sm text-gray-400 mb-10">
      Desenvolvimento em andamento...
    </p>

    <!-- Botão -->
    <a href="contato.html"
       class="inline-flex items-center gap-2 bg-cyan-500 hover:bg-cyan-400 transition-all duration-300 px-8 py-4 rounded-2xl text-lg font-semibold shadow-lg shadow-cyan-500/30">
      Entrar em Contato
    </a>

  </div>

</body>
</html>
