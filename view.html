<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Dashboard de Permissões
  </title>

  <link rel="stylesheet" href="style.css">

  <!-- XLSX -->
  <script
    defer
    src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js">
  </script>

  <!-- CHART -->
  <script
    defer
    src="https://cdn.jsdelivr.net/npm/chart.js">
  </script>

  <!-- PDF -->
  <script
    defer
    src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
  </script>

  <!-- PDF TABLE -->
  <script
    defer
    src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js">
  </script>

  <!-- APP -->
  <script
    defer
    src="app.js">
  </script>

</head>

<body>

<div class="container">

  <!-- TOPO -->
  <div class="topbar">

    <div class="title">

      <h1>
        Dashboard de Permissões
      </h1>

    </div>

    <div class="actions">

      <input
        type="file"
        id="csvFile"
        accept=".csv,.xlsx,.xls"
      >

      <input
        type="text"
        id="search"
        placeholder="Buscar usuário, grupo ou pasta..."
      >

      <button id="generatePDF">
        Gerar PDF
      </button>

    </div>

  </div>

  <!-- CARDS -->
  <div
    class="cards"
    id="stats"
  ></div>

  <!-- ÁRVORE -->
  <div class="tree-box">

    <h2>
      Árvore de Permissões
    </h2>

    <div id="tree"></div>

  </div>

</div>

</body>
</html>
